<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/loader.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/control.css" />
  <link rel="stylesheet" href="../css/toast.css" />
  <link rel="stylesheet" href="../css/control/updateConfig.css" />
  <link rel="stylesheet" href="../css/control/status.css" />
  <link rel="stylesheet" href="../css/control/logs.css" />
  <link rel="stylesheet" href="../css/control/clean.css" defer />
  <link rel="stylesheet" href="../public/fonts.css" />

  <link rel="stylesheet" href="../public/css/all.min.css" />

  <!-- Moment.js -->
  <script src="../public/js//moment.min.js"></script>

  <!-- Moment Timezone -->
  <script src="../public/js/moment-timezone-with-data.min.js"></script>
</head>
<body>
  <div id="pageLoader" class="page-loader">
    <div class="loader"></div>
    <p>Loading...</p>
  </div>
  <div class="container hidden" id="appContainer">
    <div id="sidebarContainer"></div>
    <div id="logoutModalContainer"></div>
    <div id="timezoneModalContainer"></div>
    <div id="toastContainer"></div>
    <div class="main">
      <div id="topbarContainer"></div>

      <div class="page-header">
        <nav class="page-tabs">
          <div class="tab-track">
            <button class="page-tab active" data-tab="updateConfig">
              <span class="tab-icon">🔄</span>
              <span>Update Config</span>
            </button>
            <button class="page-tab" data-tab="status">
              <span class="tab-icon">📊</span>
              <span>Status</span>
            </button>
            <button class="page-tab" data-tab="setup">
              <span class="tab-icon">⚙️</span>
              <span>Install</span>
            </button>
            <button class="page-tab" data-tab="clean">
              <span class="tab-icon">🧹</span>
              <span>Clean</span>
            </button>

            <button class="page-tab" data-tab="logs">
              <span class="tab-icon">📜</span>
              <span>Logs</span>
            </button>

            <!-- <button class="page-tab" onclick="switchTab('env', this)">
              <span class="tab-icon">🌐</span>
              <span>Env</span>
            </button> -->

            <div class="tab-indicator"></div>
          </div>
        </nav>
      </div>

      <div id="content"></div>
    </div>
  </div>

  <script type="module" src="/js/pages/control.js"></script>
</body>
