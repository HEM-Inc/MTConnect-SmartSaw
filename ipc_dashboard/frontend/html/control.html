<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/loader.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/control.css" />
  <link rel="stylesheet" href="../css/toast.css" />
  <link rel="stylesheet" href="../css/control/updateConfig.css" />
  <link rel="stylesheet" href="../css/control/status.css" />
  <link rel="stylesheet" href="../css/control/logs.css" />
  <link rel="stylesheet" href="../css/control/clean.css" defer />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/icon?family=Material+Icons"
    onload="
      this.onload = null;
      this.rel = 'stylesheet';
    "
  />
  <link
    rel="preload"
    as="style"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    onload="
      this.onload = null;
      this.rel = 'stylesheet';
    "
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet"
  />

  <!-- Moment.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>

  <!-- Moment Timezone -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.45/moment-timezone-with-data.min.js"></script>
</head>
<body>
  <div id="pageLoader" class="page-loader">
    <div class="loader"></div>
    <p>Loading...</p>
  </div>
  <div class="container hidden" id="appContainer">
    <div id="sidebarContainer"></div>
    <div id="logoutModalContainer"></div>
    <div id="timezoneModalContainer"></div>
    <div id="toastContainer"></div>
    <div class="main">
      <div id="topbarContainer"></div>

      <div class="page-header">
        <h2 class="page-title">Control</h2>

        <nav class="page-tabs">
          <div class="tab-track">
            <button
              class="page-tab active"
              onclick="switchTab('updateConfig', this)"
            >
              <span class="tab-icon">🔄</span>
              <span>Update Config</span>
            </button>
            <button class="page-tab" onclick="switchTab('status', this)">
              <span class="tab-icon">📊</span>
              <span>Status</span>
            </button>
            <button class="page-tab" onclick="switchTab('setup', this)">
              <span class="tab-icon">⚙️</span>
              <span>Setup</span>
            </button>
            <button class="page-tab" onclick="switchTab('clean', this)">
              <span class="tab-icon">🧹</span>
              <span>Clean</span>
            </button>

            <button class="page-tab" onclick="switchTab('logs', this)">
              <span class="tab-icon">📜</span>
              <span>Logs</span>
            </button>

            <!-- <button class="page-tab" onclick="switchTab('env', this)">
              <span class="tab-icon">🌐</span>
              <span>Env</span>
            </button> -->

            <div class="tab-indicator"></div>
          </div>
        </nav>
      </div>

      <div id="content"></div>
    </div>
  </div>

  <script type="module" src="/js/pages/control.js"></script>
</body>
