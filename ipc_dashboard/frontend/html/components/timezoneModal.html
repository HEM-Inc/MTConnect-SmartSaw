<div id="timezoneModal" class="modal">
  <div class="modal-content timezone-box">
    <h3>Select Timezone</h3>

    <select id="timezoneSelect" class="timezone-dropdown"></select>

    <div class="modal-actions">
      <button class="btn primary" onclick="submitTimezone()">Submit</button>
      <button class="btn secondary" onclick="closeTimezoneModal()">
        Cancel
      </button>
    </div>
  </div>
</div>
