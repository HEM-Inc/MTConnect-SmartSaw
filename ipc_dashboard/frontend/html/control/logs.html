<div class="lv-layout">
  <!-- Sidebar -->
  <div class="lv-sidebar">
    <div class="lv-sidebar-header">
      <div class="lv-sidebar-title">
        <svg
          class="lv-chevron"
          id="lvChevron"
          width="10"
          height="10"
          viewBox="0 0 10 10"
          fill="none"
        >
          <path
            d="M2 3.5L5 6.5L8 3.5"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>COMPONENTS</span>
      </div>
    </div>
    <nav class="lv-component-list" id="lvContainerList">
      <div class="lv-state-msg lv-loading">
        <div class="lv-spinner"></div>
        <span>Loading containers…</span>
      </div>
    </nav>
  </div>

  <!-- Console -->
  <div class="lv-console">
    <div class="lv-console-header">
      <div class="lv-console-title-row">
        <span class="lv-bolt">⚡</span>
        <span class="lv-console-title" id="lvConsoleTitle"
          >Live Update Console</span
        >
      </div>
      <div class="lv-console-controls">
        <button class="lv-ctrl-btn" id="lvClearBtn">Clear</button>
        <button class="lv-ctrl-btn" id="lvCopyBtn">Copy</button>
      </div>
    </div>
    <div class="lv-console-body" id="lvConsoleBody">
      <pre
        class="lv-log-output"
        id="lvLogOutput"
      ><span class="lv-ready-line">System console ready...</span>
</pre>
    </div>
  </div>
</div>
<script src="../../js/pages/control/logs.js"></script>
