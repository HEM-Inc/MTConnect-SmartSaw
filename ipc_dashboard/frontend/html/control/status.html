<div class="tab-single-layout status-page status-hidden" id="statusPage">
  <h3 class="status-title">System Overview</h3>

  <!-- Top Stats -->
  <div class="status-summary">
    <div class="summary-card running">
      <span class="count" id="runningCount">0</span>
      <span class="label">Running</span>
    </div>

    <div class="summary-card stopped">
      <span class="count" id="stoppedCount">0</span>
      <span class="label">Stopped</span>
    </div>

    <div class="summary-card error">
      <span class="count" id="errorCount">0</span>
      <span class="label">Error</span>
    </div>

    <div class="summary-card uptime">
      <span class="count" id="uptime">--%</span>
      <span class="label">Live Uptime</span>
    </div>
  </div>

  <!-- Cards -->
  <div class="status-grid" id="statusGrid"></div>
</div>

<script type="module" src="/js/pages/status.js"></script>
